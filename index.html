<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="favicon.png" type="image/x-icon">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="ChessboardCookie.png" type="image/x-icon">
<title>Bornö Station Cookbook</title>
<meta name="description" content="A two-page HTML book viewer for a PDF cookbook">

<style>
:root {
  --paper: #fffdf2;
  --ink: #2f2a20;
  --muted: #746f58;
  --desk: #ffffd6;
  --page-width: 500px;
  --page-ratio: 210 / 297;
  --shadow: 0 22px 55px rgba(78, 70, 38, .20);
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  min-height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  color: var(--ink);
  background:
    radial-gradient(
      circle at 50% 15%,
      rgba(255,255,255,.82),
      transparent 42%
    ),
    var(--desk);
  font-family: Arial, Helvetica, sans-serif;
}

button,
input {
  font: inherit;
}

.book-app {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  overflow: hidden;
}

.stage {
  width: 100%;
  min-width: 0;
  min-height: 0;
  position: relative;
  display: grid;
  place-items: center;
  padding: 10px 12px 4px;
  overflow: hidden;
}

.spread {
  display: grid;
  grid-template-columns: repeat(2, var(--page-width));
  gap: 0;
  align-items: center;
  justify-content: center;
  max-width: 100%;
  max-height: 100%;
  filter: drop-shadow(0 18px 28px rgba(0,0,0,.12));
}

.pdf-page {
  width: var(--page-width);
  aspect-ratio: var(--page-ratio);
  position: relative;
  display: grid;
  place-items: center;
  overflow: hidden;
  background: var(--paper);
  box-shadow: var(--shadow);
}

.pdf-page.left {
  border-right: 1px solid rgba(0,0,0,.15);
}

.pdf-page.right {
  border-left: 1px solid rgba(255,255,255,.55);
}

.pdf-page.is-blank {
  background:
    linear-gradient(
      90deg,
      rgba(0,0,0,.025),
      transparent 4%
    ),
    #faf9f5;
}

.pdf-page.is-blank canvas {
  display: none;
}

.pdf-page canvas {
  display: block;
  width: 100%;
  height: 100%;
  max-width: 100%;
  max-height: 100%;
}

.page-loader {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: #777168;
  font-size: 13px;
  background: rgba(255,255,255,.74);
}

.pdf-page.is-rendered .page-loader,
.pdf-page.is-blank .page-loader {
  display: none;
}

.loading-panel {
  position: absolute;
  z-index: 10;
  width: min(460px, calc(100vw - 40px));
  padding: 28px;
  border: 1px solid rgba(0,0,0,.16);
  border-radius: 18px;
  background: rgba(255,255,255,.94);
  box-shadow: 0 20px 55px rgba(0,0,0,.18);
  text-align: center;
  backdrop-filter: blur(10px);
}

.loading-panel[hidden] {
  display: none;
}

.loading-panel h1 {
  margin: 0 0 12px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 28px;
}

.loading-panel p {
  margin: 0;
  color: var(--muted);
  line-height: 1.5;
}

.loading-panel code {
  padding: 2px 5px;
  background: #efede7;
  border-radius: 4px;
}

.loading-progress {
  margin-top: 18px;
}

.progress-track {
  width: 100%;
  height: 12px;
  overflow: hidden;
  border: 1px solid #8f8968;
  border-radius: 999px;
  background: #efedcf;
}

.progress-fill {
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: #8f8968;
  transition: width .15s ease;
}

.progress-label {
  margin-top: 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
}

.progress-track.is-indeterminate .progress-fill {
  width: 35%;
  animation: loading-slide 1.1s linear infinite;
}

@keyframes loading-slide {
  from {
    transform: translateX(-120%);
  }

  to {
    transform: translateX(320%);
  }
}

.error-message {
  color: #8d241d !important;
}

.controls {
  min-height: 44px;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: nowrap;
  gap: 5px;
  padding: 4px 8px 6px;
}

.control-button {
  border: 1px solid #6f6a60;
  background: rgba(255,255,255,.8);
  color: #24221e;
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 11px;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,.07);
}

.page-status {
  min-width: 104px;
  text-align: center;
  color: #59554d;
  font-size: 11px;
  line-height: 1;
}

.page-jump {
  width: 48px;
  border: 1px solid #8d887e;
  border-radius: 999px;
  padding: 5px 6px;
  background: rgba(255,255,255,.8);
  text-align: center;
  font-size: 11px;
  line-height: 1;
}

/*
  Phone layout:
  show one complete PDF page rather than two tiny pages.
*/
@media (max-width: 600px) {
  .controls {
    min-height: 38px;
    gap: 3px;
    padding: 3px 4px 5px;
  }

  .control-button {
    padding: 4px 7px;
    font-size: 9px;
  }

  .page-status {
    min-width: 76px;
    font-size: 9px;
  }

  .page-jump {
    width: 40px;
    padding: 4px;
    font-size: 9px;
  }

  .loading-panel {
    width: calc(100vw - 24px);
    padding: 22px 18px;
  }

  .loading-panel h1 {
    font-size: 23px;
  }

  .loading-panel p {
    font-size: 13px;
  }
}

@media print {
  html,
  body {
    overflow: visible;
    background: #fff;
  }

  .book-app {
    display: block;
    height: auto;
  }

  .stage {
    display: block;
    padding: 0;
    overflow: visible;
  }

  .spread {
    display: block;
    filter: none;
  }

  .pdf-page,
  .pdf-page.right {
    display: grid;
    width: 210mm;
    height: 297mm;
    box-shadow: none;
    break-after: page;
    page-break-after: always;
  }

  .controls,
  .loading-panel {
    display: none !important;
  }
}
</style>
</head>

<body>
<div class="book-app">

  <main class="stage" id="bookStage">

    <section
      class="spread"
      id="spread"
      aria-label="PDF cookbook pages"
    >
      <article
        class="pdf-page left"
        id="leftPage"
        aria-label="Left PDF page"
      >
        <canvas id="leftCanvas"></canvas>
        <div class="page-loader">Rendering page…</div>
      </article>

      <article
        class="pdf-page right"
        id="rightPage"
        aria-label="Right PDF page"
      >
        <canvas id="rightCanvas"></canvas>
        <div class="page-loader">Rendering page…</div>
      </article>
    </section>

    <section class="loading-panel" id="loadingPanel">
      <h1>Bornö Cookbook</h1>

      <p id="loadingText">
        Loading 
        <code>BornoCookbook.pdf</code>
      </p>

      <div class="loading-progress">
        <div
          class="progress-track"
          id="progressTrack"
          role="progressbar"
          aria-label="PDF loading progress"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <div
            class="progress-fill"
            id="progressFill"
          ></div>
        </div>

        <div
          class="progress-label"
          id="progressLabel"
        >
          0%
        </div>
      </div>
    </section>

  </main>

  <nav class="controls" aria-label="Book navigation">

    <button
      class="control-button"
      id="firstButton"
      type="button"
    >
      First
    </button>

    <button
      class="control-button"
      id="previousButton"
      type="button"
    >
      Previous
    </button>

    <div
      class="page-status"
      id="pageStatus"
      aria-live="polite"
    >
      Pages —
    </div>

    <button
      class="control-button"
      id="nextButton"
      type="button"
    >
      Next
    </button>

    <button
      class="control-button"
      id="lastButton"
      type="button"
    >
      Last
    </button>

    <input
      class="page-jump"
      id="pageJump"
      type="number"
      min="1"
      value="1"
      aria-label="Go to PDF page"
      title="Enter a PDF page number"
    >

    <button
      class="control-button"
      id="goButton"
      type="button"
    >
      Go
    </button>

  </nav>
</div>

<script type="module">
/*
  Put BornoCookbook.pdf beside this HTML file.

  PDF.js is loaded from a CDN. For a fully offline version,
  download pdf.min.mjs and pdf.worker.min.mjs and change
  both URLs below.
*/

import * as pdfjsLib from
  "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.7.284/build/pdf.min.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.7.284/build/pdf.worker.min.mjs";

const DEFAULT_PDF_FILE = "./BornoCookbook.pdf";
const PHONE_BREAKPOINT = 600;

const stage =
  document.getElementById("bookStage");

const loadingPanel =
  document.getElementById("loadingPanel");

const loadingText =
  document.getElementById("loadingText");

const progressTrack =
  document.getElementById("progressTrack");

const progressFill =
  document.getElementById("progressFill");

const progressLabel =
  document.getElementById("progressLabel");

const leftPage =
  document.getElementById("leftPage");

const rightPage =
  document.getElementById("rightPage");

const leftCanvas =
  document.getElementById("leftCanvas");

const rightCanvas =
  document.getElementById("rightCanvas");

const firstButton =
  document.getElementById("firstButton");

const previousButton =
  document.getElementById("previousButton");

const nextButton =
  document.getElementById("nextButton");

const lastButton =
  document.getElementById("lastButton");

const pageStatus =
  document.getElementById("pageStatus");

const pageJump =
  document.getElementById("pageJump");

const goButton =
  document.getElementById("goButton");

let pdfDocument = null;
let firstPageInSpread = 1;
let renderGeneration = 0;
let pdfObjectUrl = "";
let resizeTimer = 0;

/*
  Default A4 height-to-width ratio.
  This is replaced with the real ratio from the loaded PDF.
*/
let pdfHeightToWidthRatio = 297 / 210;

function getPagesPerSpread() {
  return window.innerWidth <= PHONE_BREAKPOINT
    ? 1
    : 2;
}

function fitPagesToScreen() {
  const stageStyle =
    window.getComputedStyle(stage);

  const horizontalPadding =
    parseFloat(stageStyle.paddingLeft) +
    parseFloat(stageStyle.paddingRight);

  const verticalPadding =
    parseFloat(stageStyle.paddingTop) +
    parseFloat(stageStyle.paddingBottom);

  const availableWidth =
    Math.max(
      1,
      stage.clientWidth - horizontalPadding
    );

  const availableHeight =
    Math.max(
      1,
      stage.clientHeight - verticalPadding
    );

  const pagesPerSpread =
    getPagesPerSpread();

  const widthAllowedByScreen =
    availableWidth / pagesPerSpread;

  const widthAllowedByHeight =
    availableHeight / pdfHeightToWidthRatio;

  const fittedWidth =
    Math.max(
      1,
      Math.min(
        widthAllowedByScreen,
        widthAllowedByHeight,
        690
      )
    );

  document.documentElement.style.setProperty(
    "--page-width",
    `${Math.floor(fittedWidth)}px`
  );
}

function formatFileSize(bytes) {
  if (!Number.isFinite(bytes) || bytes <= 0) {
    return "0 MB";
  }

  const megabytes =
    bytes / (1024 * 1024);

  return `${megabytes.toFixed(1)} MB`;
}

function resetLoadingProgress() {
  progressTrack.classList.remove(
    "is-indeterminate"
  );

  progressTrack.setAttribute(
    "aria-valuenow",
    "0"
  );

  progressFill.style.width = "0%";
  progressFill.style.transform = "none";
  progressLabel.textContent = "0%";
}

function updateLoadingProgress(
  loaded,
  total
) {
  if (
    Number.isFinite(total) &&
    total > 0
  ) {
    const percentage =
      Math.min(
        100,
        Math.round(
          (loaded / total) * 100
        )
      );

    progressTrack.classList.remove(
      "is-indeterminate"
    );

    progressFill.style.transform = "none";

    progressTrack.setAttribute(
      "aria-valuenow",
      String(percentage)
    );

    progressFill.style.width =
      `${percentage}%`;

    progressLabel.textContent =
      `${percentage}% · ` +
      `${formatFileSize(loaded)} of ` +
      `${formatFileSize(total)}`;
  } else {
    progressTrack.classList.add(
      "is-indeterminate"
    );

    progressTrack.removeAttribute(
      "aria-valuenow"
    );

    progressLabel.textContent =
      `${formatFileSize(loaded)} loaded`;
  }
}

function finishLoadingProgress() {
  progressTrack.classList.remove(
    "is-indeterminate"
  );

  progressFill.style.transform = "none";

  progressTrack.setAttribute(
    "aria-valuenow",
    "100"
  );

  progressFill.style.width = "100%";
  progressLabel.textContent = "100%";
}

function setLoadingMessage(
  message,
  isError = false
) {
  loadingText.classList.toggle(
    "error-message",
    isError
  );

  loadingText.innerHTML = message;
  loadingPanel.hidden = false;
}

function clearPdfObjectUrl() {
  if (pdfObjectUrl) {
    URL.revokeObjectURL(pdfObjectUrl);
    pdfObjectUrl = "";
  }
}

function updateControls() {
  const hasPdf =
    Boolean(pdfDocument);

  const total =
    hasPdf
      ? pdfDocument.numPages
      : 0;

  const pagesPerSpread =
    getPagesPerSpread();

  const lastVisible =
    Math.min(
      firstPageInSpread +
      pagesPerSpread -
      1,
      total
    );

  firstButton.disabled =
    !hasPdf ||
    firstPageInSpread <= 1;

  previousButton.disabled =
    !hasPdf ||
    firstPageInSpread <= 1;

  nextButton.disabled =
    !hasPdf ||
    firstPageInSpread +
    pagesPerSpread >
    total;

  lastButton.disabled =
    !hasPdf ||
    firstPageInSpread +
    pagesPerSpread >
    total;

  pageJump.disabled =
    !hasPdf;

  goButton.disabled =
    !hasPdf;

  pageJump.max =
    total || 1;

  pageJump.value =
    hasPdf
      ? firstPageInSpread
      : 1;

  if (!hasPdf) {
    pageStatus.textContent =
      "Pages —";
  } else if (
    firstPageInSpread === lastVisible
  ) {
    pageStatus.textContent =
      `Page ${firstPageInSpread} of ${total}`;
  } else {
    pageStatus.textContent =
      `Pages ${firstPageInSpread}–${lastVisible} of ${total}`;
  }
}

function setPageState(
  pageElement,
  state
) {
  pageElement.classList.toggle(
    "is-blank",
    state === "blank"
  );

  pageElement.classList.toggle(
    "is-rendered",
    state === "rendered"
  );
}

function clearCanvas(
  canvas,
  pageElement
) {
  const context =
    canvas.getContext("2d");

  context.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  setPageState(
    pageElement,
    "blank"
  );

  pageElement.setAttribute(
    "aria-label",
    "Blank page"
  );
}

async function renderPdfPage(
  pageNumber,
  canvas,
  pageElement,
  generation
) {
  if (
    !pdfDocument ||
    pageNumber >
    pdfDocument.numPages
  ) {
    clearCanvas(
      canvas,
      pageElement
    );

    return;
  }

  setPageState(
    pageElement,
    "loading"
  );

  pageElement.setAttribute(
    "aria-label",
    `PDF page ${pageNumber}`
  );

  const page =
    await pdfDocument.getPage(
      pageNumber
    );

  if (
    generation !==
    renderGeneration
  ) {
    return;
  }

  const unscaledViewport =
    page.getViewport({
      scale: 1
    });

  const cssWidth =
    pageElement
      .getBoundingClientRect()
      .width;

  if (cssWidth <= 0) {
    return;
  }

  const cssScale =
    cssWidth /
    unscaledViewport.width;

  const outputScale =
    Math.min(
      window.devicePixelRatio || 1,
      2
    );

  const renderViewport =
    page.getViewport({
      scale:
        cssScale *
        outputScale
    });

  const cssHeight =
    unscaledViewport.height *
    cssScale;

  pageElement.style.aspectRatio =
    `${unscaledViewport.width} / ${unscaledViewport.height}`;

  canvas.width =
    Math.floor(
      renderViewport.width
    );

  canvas.height =
    Math.floor(
      renderViewport.height
    );

  canvas.style.width =
    `${cssWidth}px`;

  canvas.style.height =
    `${cssHeight}px`;

  const context =
    canvas.getContext(
      "2d",
      {
        alpha: false
      }
    );

  context.save();

  context.fillStyle =
    "#ffffff";

  context.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  context.restore();

  await page.render({
    canvasContext: context,
    viewport: renderViewport
  }).promise;

  if (
    generation !==
    renderGeneration
  ) {
    return;
  }

  setPageState(
    pageElement,
    "rendered"
  );
}

async function renderSpread() {
  if (!pdfDocument) {
    return;
  }

  fitPagesToScreen();

  const generation =
    ++renderGeneration;

  const pagesPerSpread =
    getPagesPerSpread();

  updateControls();

  try {
    if (pagesPerSpread === 1) {
      clearCanvas(
        rightCanvas,
        rightPage
      );

      await renderPdfPage(
        firstPageInSpread,
        leftCanvas,
        leftPage,
        generation
      );
    } else {
      await Promise.all([
        renderPdfPage(
          firstPageInSpread,
          leftCanvas,
          leftPage,
          generation
        ),

        renderPdfPage(
          firstPageInSpread + 1,
          rightCanvas,
          rightPage,
          generation
        )
      ]);
    }
  } catch (error) {
    if (
      generation ===
      renderGeneration
    ) {
      console.error(error);

      setLoadingMessage(
        "The PDF loaded, but a page could not be rendered.<br>" +
        "Open the browser console for the technical error.",
        true
      );
    }
  }
}

function showSpreadStartingAt(
  pageNumber
) {
  if (!pdfDocument) {
    return;
  }

  const pagesPerSpread =
    getPagesPerSpread();

  const clampedPage =
    Math.max(
      1,
      Math.min(
        Number(pageNumber) || 1,
        pdfDocument.numPages
      )
    );

  firstPageInSpread =
    Math.floor(
      (clampedPage - 1) /
      pagesPerSpread
    ) *
    pagesPerSpread +
    1;

  renderSpread();
}

async function loadPdfBytes(
  bytes,
  name
) {
  setLoadingMessage(
    `Loading <strong>${name}</strong>…`
  );

  renderGeneration += 1;

  if (pdfDocument) {
    try {
      await pdfDocument.destroy();
    } catch (error) {
      console.warn(
        "The previous PDF could not be destroyed cleanly.",
        error
      );
    }
  }

  clearPdfObjectUrl();

  const originalBytes =
    new Uint8Array(bytes);

  pdfObjectUrl =
    URL.createObjectURL(
      new Blob(
        [originalBytes],
        {
          type:
            "application/pdf"
        }
      )
    );

  const loadingTask =
    pdfjsLib.getDocument({
      data:
        originalBytes.slice()
    });

  pdfDocument =
    await loadingTask.promise;

  const firstPage =
    await pdfDocument.getPage(1);

  const firstViewport =
    firstPage.getViewport({
      scale: 1
    });

  pdfHeightToWidthRatio =
    firstViewport.height /
    firstViewport.width;

  document.documentElement
    .style
    .setProperty(
      "--page-ratio",
      `${firstViewport.width} / ${firstViewport.height}`
    );

  firstPageInSpread = 1;

  loadingPanel.hidden = true;

  fitPagesToScreen();
  updateControls();

  await renderSpread();
}

async function loadDefaultPdf() {
  try {
    const pdfFilename =
      DEFAULT_PDF_FILE
        .split("/")
        .pop();

    setLoadingMessage(
      `Loading <strong>${pdfFilename}</strong>…`
    );

    resetLoadingProgress();

    const loadingTask =
      pdfjsLib.getDocument({
        url: DEFAULT_PDF_FILE,
        disableRange: false,
        disableStream: false,
        rangeChunkSize: 262144
      });

    loadingTask.onProgress =
      progressData => {
        updateLoadingProgress(
          progressData.loaded,
          progressData.total
        );
      };

    pdfDocument =
      await loadingTask.promise;

    const firstPage =
      await pdfDocument.getPage(1);

    const firstViewport =
      firstPage.getViewport({
        scale: 1
      });

    pdfHeightToWidthRatio =
      firstViewport.height /
      firstViewport.width;

    document.documentElement
      .style
      .setProperty(
        "--page-ratio",
        `${firstViewport.width} / ${firstViewport.height}`
      );

    firstPageInSpread = 1;

    fitPagesToScreen();
    updateControls();

    await renderSpread();

    finishLoadingProgress();

    window.setTimeout(
      () => {
        loadingPanel.hidden = true;
      },
      200
    );

  } catch (error) {
    console.warn(
      "The default PDF could not be loaded.",
      error
    );

    const pdfFilename =
      DEFAULT_PDF_FILE
        .split("/")
        .pop();

    progressTrack.classList.remove(
      "is-indeterminate"
    );

    progressFill.style.transform = "none";
    progressFill.style.width = "0%";
    progressLabel.textContent = "Loading failed";

    setLoadingMessage(
      `The file <code>${pdfFilename}</code> could not be loaded.<br>` +
      "Make sure the PDF is beside this HTML file and that the filename " +
      "matches exactly.",
      true
    );

    updateControls();
  }
}

firstButton.addEventListener(
  "click",
  () => {
    showSpreadStartingAt(1);
  }
);

previousButton.addEventListener(
  "click",
  () => {
    showSpreadStartingAt(
      firstPageInSpread -
      getPagesPerSpread()
    );
  }
);

nextButton.addEventListener(
  "click",
  () => {
    showSpreadStartingAt(
      firstPageInSpread +
      getPagesPerSpread()
    );
  }
);

lastButton.addEventListener(
  "click",
  () => {
    showSpreadStartingAt(
      pdfDocument
        ? pdfDocument.numPages
        : 1
    );
  }
);

goButton.addEventListener(
  "click",
  () => {
    showSpreadStartingAt(
      pageJump.value
    );
  }
);

pageJump.addEventListener(
  "keydown",
  event => {
    if (
      event.key ===
      "Enter"
    ) {
      showSpreadStartingAt(
        pageJump.value
      );
    }
  }
);

document.addEventListener(
  "keydown",
  event => {
    if (
      event.target
        instanceof
        HTMLInputElement ||
      event.target
        instanceof
        HTMLButtonElement
    ) {
      return;
    }

    if (
      event.key ===
        "ArrowLeft" ||
      event.key ===
        "PageUp"
    ) {
      showSpreadStartingAt(
        firstPageInSpread -
        getPagesPerSpread()
      );
    }

    if (
      event.key ===
        "ArrowRight" ||
      event.key ===
        "PageDown" ||
      event.key ===
        " "
    ) {
      event.preventDefault();

      showSpreadStartingAt(
        firstPageInSpread +
        getPagesPerSpread()
      );
    }

    if (
      event.key ===
      "Home"
    ) {
      showSpreadStartingAt(1);
    }

    if (
      event.key ===
        "End" &&
      pdfDocument
    ) {
      showSpreadStartingAt(
        pdfDocument.numPages
      );
    }
  }
);

window.addEventListener(
  "resize",
  () => {
    clearTimeout(
      resizeTimer
    );

    resizeTimer =
      setTimeout(
        () => {
          fitPagesToScreen();

          if (pdfDocument) {
            showSpreadStartingAt(
              firstPageInSpread
            );
          }
        },
        180
      );
  },
  {
    passive: true
  }
);

window.addEventListener(
  "orientationchange",
  () => {
    clearTimeout(
      resizeTimer
    );

    resizeTimer =
      setTimeout(
        () => {
          fitPagesToScreen();

          if (pdfDocument) {
            showSpreadStartingAt(
              firstPageInSpread
            );
          }
        },
        250
      );
  }
);

window.addEventListener(
  "beforeunload",
  clearPdfObjectUrl
);

fitPagesToScreen();
updateControls();
loadDefaultPdf();
</script>
</body>
</html>
